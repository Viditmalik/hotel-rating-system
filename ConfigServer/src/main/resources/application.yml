server:
  port: 8085
spring:
  application:
    name: CONFIGSERVER
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Viditmalik/microservice-config
          clone-on-start: true
          timeout: 30
eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone : http://service-registry:8761/eureka

