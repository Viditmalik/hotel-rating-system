apiVersion: apps/v1
kind: Deployment

metadata:
  name: config-server

spec:
  replicas: 1

  selector:
    matchLabels:
      app: config-server

  template:
    metadata:
      labels:
        app: config-server

    spec:
      containers:
        - name: config-server
          image: viditmalik55/config-server:latest

          ports:
            - containerPort: 8085

          imagePullPolicy: IfNotPresent