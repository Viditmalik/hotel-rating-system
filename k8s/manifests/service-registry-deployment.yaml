apiVersion: apps/v1
kind: Deployment

metadata:
  name: service-registry

spec:
  replicas: 1

  selector:
    matchLabels:
      app: service-registry

  template:
    metadata:
      labels:
        app: service-registry

    spec:
      containers:
        - name: service-registry
          image: viditmalik55/service-registry:latest
          ports:
            - containerPort: 8761
          imagePullPolicy: IfNotPresent