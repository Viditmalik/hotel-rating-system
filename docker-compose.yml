version: '3.8'

services:

  service-registry:
    image: viditmalik55/service-registry
    ports:
      - "8761:8761"

  config-server:
    image: viditmalik55/config-server
    ports:
      - "8085:8085"
    depends_on:
      - service-registry



  user-service:
    image: viditmalik55/user-service
    ports:
      - "8081:8081"
    depends_on:

      - config-server
      - service-registry
    restart: always

  rating-service:
    image: viditmalik55/rating-service
    ports:
      - "8083:8083"
    depends_on:

      - config-server
      - service-registry
    restart: always

  hotel-service:
    image: viditmalik55/hotel-service
    ports:
      - "8082:8082"
    depends_on:

      - config-server
      - service-registry
    restart: always

  api-gateway:
    image: viditmalik55/api-gateway
    ports:
      - "8084:8084"
    depends_on:
      - config-server
      - service-registry

volumes:
  mysql-data: