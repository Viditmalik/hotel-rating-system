server:
  port: 8082

spring:
  application:
    name: HOTELSERVICE
  datasource:
    url: jdbc:mysql://hotel-rating-db.cmfgoy2ca395.us-east-1.rds.amazonaws.com:3306/hoteldb?useSSL=false&allowPublicKeyRetrieval=true
    username: admin
    password: viditmalik54321
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    data:
      redis:
        host: redis
        port: 6379
  kafka:

    bootstrap-servers: kafka:29092

    consumer:

      group-id: hotel-group

      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:

        spring.json.trusted.packages: "*"

        spring.json.value.default.type: com.micro.hotel.events.RatingCreatedEvent
        spring.json.use.type.headers: false


    eureka:
      instance:
        prefer-ip-address: true
      client:
        fetch-registry: true
        register-with-eureka: true
        service-url:
          defaultZone: http://service-registry:8761/eureka

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://integrator-8250368.okta.com/oauth2/default

logging:
  level:
    org.springframework.cache: TRACE
    org.springframework.data.redis.cache: TRACE
